[project]
name = "tech-support-ticketing"
version = "0.1.0"
description = "Provider-agnostic ticketing gateway and adapters"
requires-python = ">=3.12"
dependencies = [
  "tech-support-zammad-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tech_support_ticketing"]
