[project]
name = "tech-support-agents"
version = "0.1.0"
description = "LangGraph agent graphs (Sprint 5+)"
requires-python = ">=3.12"
dependencies = [
  "tech-support-shared",
  "tech-support-orchestration",
  "tech-support-zammad-client",
  "tech-support-ticketing",
  "langgraph>=0.2.60",
  "langchain-core>=0.3.0",
  "langchain-openai>=0.3.0",
  "langgraph-checkpoint-postgres>=2.0.0",
  "psycopg[binary]>=3.2.0",
  "psycopg-pool>=3.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tech_support_agents"]
