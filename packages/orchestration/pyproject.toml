[project]
name = "tech-support-orchestration"
version = "0.1.0"
description = "Policy validator and workflow engine (Sprint 3+)"
requires-python = ">=3.12"
dependencies = [
  "tech-support-shared",
  "tech-support-zammad-client",
  "jsonschema>=4.23.0",
  "pydantic>=2.10.0",
  "PyYAML>=6.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tech_support_orchestration"]
