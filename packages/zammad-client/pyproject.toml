[project]
name = "tech-support-zammad-client"
version = "0.1.0"
description = "Zammad HTTP client and DTOs (Sprint 3+)"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.0",
  "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tech_support_zammad"]

[project.optional-dependencies]
dev = ["pytest>=8.3.0", "pytest-asyncio>=0.24.0", "respx>=0.21.0", "httpx>=0.28.0"]
