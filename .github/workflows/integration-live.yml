name: Live Integration

on:
  workflow_dispatch:

jobs:
  live-openai-zammad:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: techsupport
          POSTGRES_PASSWORD: techsupport
          POSTGRES_DB: techsupport
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techsupport -d techsupport"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: cd apps/api && uv run alembic upgrade head
        env:
          DATABASE_URL_SYNC: postgresql://techsupport:techsupport@localhost:5432/techsupport
      - name: Live integration (OpenAI + Zammad)
        run: uv run pytest tests/integration -m live -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://techsupport:techsupport@localhost:5432/techsupport
          DATABASE_URL_SYNC: postgresql://techsupport:techsupport@localhost:5432/techsupport
          REDIS_URL: redis://localhost:6379/0
          GRAPH_ENABLED: "true"
          GRAPH_LLM_MODE: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          ZAMMAD_BASE_URL: ${{ secrets.ZAMMAD_BASE_URL }}
          ZAMMAD_API_TOKEN: ${{ secrets.ZAMMAD_API_TOKEN }}
          ZAMMAD_TEST_EMAIL: ${{ secrets.ZAMMAD_TEST_EMAIL }}
