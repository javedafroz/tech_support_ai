name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: techsupport
          POSTGRES_PASSWORD: techsupport
          POSTGRES_DB: techsupport
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techsupport -d techsupport"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check apps/api packages scripts
      - run: cd apps/api && uv run alembic upgrade head
        env:
          DATABASE_URL_SYNC: postgresql://techsupport:techsupport@localhost:5432/techsupport
      - run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://techsupport:techsupport@localhost:5432/techsupport
          DATABASE_URL_SYNC: postgresql://techsupport:techsupport@localhost:5432/techsupport
          REDIS_URL: redis://localhost:6379/0

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: techsupport
          POSTGRES_PASSWORD: techsupport
          POSTGRES_DB: techsupport
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techsupport -d techsupport"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: uv sync
      - run: cd e2e && npm install && npx playwright install chromium --with-deps
      - run: cd e2e && npm test
        env:
          CI: "true"
          E2E_API_PORT: "8010"
          E2E_WEB_PORT: "5174"
          DATABASE_URL: postgresql+asyncpg://techsupport:techsupport@localhost:5432/techsupport
          DATABASE_URL_SYNC: postgresql://techsupport:techsupport@localhost:5432/techsupport
          REDIS_URL: redis://localhost:6379/0
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  zammad-sandbox:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e packages/shared -e packages/zammad-client -e packages/orchestration -e apps/api
      - name: Zammad sandbox E2E
        env:
          ZAMMAD_BASE_URL: ${{ secrets.ZAMMAD_BASE_URL }}
          ZAMMAD_API_TOKEN: ${{ secrets.ZAMMAD_API_TOKEN }}
          ZAMMAD_TEST_EMAIL: ${{ secrets.ZAMMAD_TEST_EMAIL }}
        run: python scripts/zammad_sandbox_e2e.py
