services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: techsupport
      POSTGRES_PASSWORD: techsupport
      POSTGRES_DB: techsupport
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techsupport -d techsupport"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/attachments || true &&
      exit 0
      "

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_ENV: development
      DATABASE_URL: postgresql+asyncpg://techsupport:techsupport@postgres:5432/techsupport
      DATABASE_URL_SYNC: postgresql://techsupport:techsupport@postgres:5432/techsupport
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost:5174"]'
      GRAPH_ENABLED: "true"
      GRAPH_LLM_MODE: ${GRAPH_LLM_MODE:-openai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://api:8000
      # Browser on host calls published API port (avoids in-container proxy issues)
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
