# Zammad field mapping for Tech Support AI v1
# Replace internal names with values from your sandbox: Admin → Objects
# No secrets in this file.

version: "1.0"
instance_notes: |
  Align group names, priority labels, and custom object internal names
  with your Zammad sandbox before Sprint 3 integration tests.

priorities:
  low: "1 low"
  normal: "2 normal"
  high: "3 high"

groups:
  network: "Network Support"
  security: "Security"
  software: "Software Support"
  hardware: "Hardware Support"
  access: "Access Management"
  email: "Email Support"
  infrastructure: "Infrastructure"

# Map workflow category keys → Zammad custom object value / tag
categories:
  hardware: "Hardware"
  software: "Software"
  network: "Network"
  access_management: "Access Management"
  email: "Email"
  security: "Security"
  infrastructure: "Infrastructure"

# Custom ticket object internal API names (examples — update per sandbox)
custom_fields:
  category:
    object_name: "category"
    type: "select"

customer_lookup:
  # Zammad create-on-behalf: "guess:{plain_email}" (not "guess:email:{email}" — API rejects that)
  customer_id_pattern: "guess:{email}"

default_group: "Software Support"
default_priority: "2 normal"
